<!doctype html>
<html>

                "../small.png"

        <!-- Тип -->
        <meta

        <!-- Ссылка -->

        <!-- Адаптация -->
        <meta
            name=
                "viewport"
            content=
                "width=device-width, initial-scale=1.0"
            >
        <style>
            :root
                 {
                /* 100% */
                --1111: #000000;
                --9191: #FFFFFF;
                /* 85% */
                --11185: #000000D9;
                --91985: #FFFFFFD9;
                /* 65% */
                --11165: #000000A6;
                --91965: #FFFFFFA6;
                /* 35% */
                --11135: #00000059;
                --91935: #FFFFFF59;
                /* 10% */
                --11110: #0000001A;
                --91910: #FFFFFF1A;
                /* 0% */
                --1110: #00000000;
                --9190: #FFFFFF00;
                }
            *
                {
                box-sizing: border-box;
                }
            a
                {
                text-decoration: none;
                color: inherit;
                }
            html
                {
                width: 100%;
                height: 100%;
                display: block;
                background: var(--1111);
                color: var(--9191);
                font-family: sans-serif;
                font-size: 21px;
                font-weight: 300;
                }
            body
                {
                width: 100%;
                 
                display: flex;
                flex-direction: column;
                align-items: center;
                 
                background: var(--111);
                 
                padding: 0px;
                margin: 0px;
                gap: 20px;
                 
                position: static;
                z-index: auto;
                }
            .space-between
                {
                width: 100%;
                 
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                 
                padding-top: 18px;
                padding-right: 20px;
                padding-bottom: 18px;
                padding-left: 20px;
                 
                background: linear-gradient(to bottom, var(--1111), var(--1110));
                
                position: fixed;
                z-index: 1;
                 }
            .button
                {
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 20px;
                overflow: hidden;
                transition: transform 0.2s ease;
                }
            .button:hover
                {
                backdrop-filter: blur(10px);
                background: var(--91910);
                }
            @media (max-width: 840px)
                {
                .space-between
                    {
                    padding-right: 30px;
                    padding-left: 30px;
                    }
                .button
                    {
                    backdrop-filter: blur(10px);
                    background: var(--91910);
                    }
                }
            </style>
        </head>
    <body>
        <!-- Верх -->
        <div

        <!-- Приветствие -->

        </div>
        
        </body>
    </html>
